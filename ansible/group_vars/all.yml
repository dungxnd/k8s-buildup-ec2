---
# Kubernetes and CNI versions
kubernetes_version: "1.36"
pod_network_cidr: "192.168.0.0/16"
cilium_version: "1.19.6"

# Banking demo defaults — override at runtime with:
#   ansible-playbook -i inventory.ini site.yml \
#     -e "banking_demo.duckdns.enabled=true" \
#     -e "banking_demo.duckdns.domain=mybank.duckdns.org" \
#     -e duckdns_token=your-token

banking_demo:
  repo_url: "https://github.com/dungxnd/banking-demo-revamp.git"
  repo_version: "main"
  clone_dir: "/home/ubuntu/banking-demo"
  helm_release_name: "banking-demo"
  helm_namespace: "banking"
  helm_chart_path: "helm"
  helm_wait_timeout: "5m"

  duckdns:
    enabled: false
    domain: ""
